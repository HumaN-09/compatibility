<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 Love Compatibility Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            background: white;
        }

        input[type="text"]:focus, input[type="date"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .question {
            margin-bottom: 25px;
        }

        .question-text {
            font-weight: 500;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.05em;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 500;
        }

        .option:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .progress-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.5s;
        }

        .progress-text {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .analyzing {
            text-align: center;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            text-align: center;
        }

        .heart-container {
            font-size: 80px;
            margin: 20px 0;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            10%, 30% { transform: scale(1.1); }
            20%, 40% { transform: scale(1); }
        }

        .compatibility-score {
            font-size: 4em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
        }

        .result-message {
            font-size: 1.3em;
            color: #333;
            margin: 20px 0;
            font-weight: 500;
        }

        .result-detail {
            color: #666;
            line-height: 1.8;
            margin: 20px 0;
            text-align: left;
        }

        .compatibility-breakdown {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .breakdown-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            padding: 10px;
            background: white;
            border-radius: 8px;
        }

        .breakdown-label {
            font-weight: 500;
            color: #333;
        }

        .breakdown-score {
            font-weight: 600;
            color: #667eea;
        }

        .bar-container {
            width: 100px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-left: 15px;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            transition: width 1s ease-out;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #667eea;
            animation: confetti-fall 3s linear forwards;
            z-index: 999;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .container { padding: 25px; }
            h1 { font-size: 1.5em; }
            .compatibility-score { font-size: 3em; }
            .two-column { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💕 Ultimate Love Compatibility</h1>
        <p class="subtitle">Advanced Analysis: Zodiac, Personality & More!</p>

        <div class="screen active" id="infoScreen">
            <h3 style="color: #667eea; margin-bottom: 20px; text-align: center;">👫 Your Information</h3>
            <div class="input-group">
                <label for="name1">Your Full Name:</label>
                <input type="text" id="name1" placeholder="Enter your full name...">
            </div>
            <div class="two-column">
                <div class="input-group">
                    <label for="zodiac1">Your Zodiac Sign:</label>
                    <select id="zodiac1">
                        <option value="">Select...</option>
                        <option value="aries">♈ Aries</option>
                        <option value="taurus">♉ Taurus</option>
                        <option value="gemini">♊ Gemini</option>
                        <option value="cancer">♋ Cancer</option>
                        <option value="leo">♌ Leo</option>
                        <option value="virgo">♍ Virgo</option>
                        <option value="libra">♎ Libra</option>
                        <option value="scorpio">♏ Scorpio</option>
                        <option value="sagittarius">♐ Sagittarius</option>
                        <option value="capricorn">♑ Capricorn</option>
                        <option value="aquarius">♒ Aquarius</option>
                        <option value="pisces">♓ Pisces</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="birthdate1">Birth Date:</label>
                    <input type="date" id="birthdate1">
                </div>
            </div>

            <hr style="margin: 30px 0; border: none; border-top: 2px solid #f0f0f0;">

            <h3 style="color: #667eea; margin-bottom: 20px; text-align: center;">💑 Partner's Information</h3>
            <div class="input-group">
                <label for="name2">Partner's Full Name:</label>
                <input type="text" id="name2" placeholder="Enter their full name...">
            </div>
            <div class="two-column">
                <div class="input-group">
                    <label for="zodiac2">Partner's Zodiac:</label>
                    <select id="zodiac2">
                        <option value="">Select...</option>
                        <option value="aries">♈ Aries</option>
                        <option value="taurus">♉ Taurus</option>
                        <option value="gemini">♊ Gemini</option>
                        <option value="cancer">♋ Cancer</option>
                        <option value="leo">♌ Leo</option>
                        <option value="virgo">♍ Virgo</option>
                        <option value="libra">♎ Libra</option>
                        <option value="scorpio">♏ Scorpio</option>
                        <option value="sagittarius">♐ Sagittarius</option>
                        <option value="capricorn">♑ Capricorn</option>
                        <option value="aquarius">♒ Aquarius</option>
                        <option value="pisces">♓ Pisces</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="birthdate2">Birth Date:</label>
                    <input type="date" id="birthdate2">
                </div>
            </div>
            <button onclick="validateAndContinue()">Continue to Questions ✨</button>
        </div>

        <div class="screen" id="quizScreen">
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText"></div>
            <div id="questionContainer"></div>
            <button onclick="nextQuestion()" id="nextBtn" disabled>Next →</button>
        </div>

        <div class="screen" id="analyzingScreen">
            <div class="analyzing">
                <div class="spinner"></div>
                <p style="color: #666;">Calculating cosmic alignment...</p>
            </div>
        </div>

        <div class="screen" id="resultScreen">
            <div class="result">
                <div class="heart-container" id="heartEmoji">💖</div>
                <div class="compatibility-score" id="scoreDisplay">100%</div>
                <div class="result-message" id="resultMessage">Perfect Match!</div>
                <div class="compatibility-breakdown">
                    <div class="breakdown-title">📊 Compatibility Breakdown</div>
                    <div id="breakdownContainer"></div>
                </div>
                <div class="result-detail" id="resultDetail"></div>
                <button onclick="restart()">Try Again 🔄</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { category: "Communication", question: "How do you handle conflicts?", options: ["Talk it out", "Need time", "Avoid it", "Compromise"] },
            { category: "Values", question: "What matters most in love?", options: ["Trust", "Fun", "Support", "Goals"] },
            { category: "Lifestyle", question: "Ideal weekend?", options: ["Adventure", "Cozy Home", "Socializing", "Learning"] }
        ];

        let currentQuestion = 0;
        let userData = { name1: "", zodiac1: "", name2: "", zodiac2: "" };
        let answers = [];

        function validateAndContinue() {
            userData.name1 = document.getElementById('name1').value.trim().toLowerCase();
            userData.name2 = document.getElementById('name2').value.trim().toLowerCase();
            userData.zodiac1 = document.getElementById('zodiac1').value;
            userData.zodiac2 = document.getElementById('zodiac2').value;

            if (!userData.name1 || !userData.name2 || !userData.zodiac1 || !userData.zodiac2) {
                alert('Please fill in all details! 💕');
                return;
            }
            showScreen('quizScreen');
            displayQuestion();
        }

        function checkPerfectMatch() {
            // Check if one name contains "tanush" and the other contains "sumera"
            const hasTanush = userData.name1.includes("tanush") || userData.name2.includes("tanush");
            const hasSumera = userData.name1.includes("sumera") || userData.name2.includes("sumera");
            
            // Strictly check that BOTH are present and NO OTHER forbidden matches are occurring
            // (e.g. Tanush + PersonX is NOT 100%)
            const isTanush1 = userData.name1.includes("tanush");
            const isSumera2 = userData.name2.includes("sumera");
            const isSumera1 = userData.name1.includes("sumera");
            const isTanush2 = userData.name2.includes("tanush");

            return (isTanush1 && isSumera2) || (isSumera1 && isTanush2);
        }

        function calculateDetailedCompatibility() {
            if (checkPerfectMatch()) {
                return { overall: 100, zodiac: 100, emotional: 100, comms: 100, lifestyle: 100 };
            } else {
                // Ensure anyone else never reaches 100
                const r = () => 50 + Math.floor(Math.random() * 44); 
                const scores = { zodiac: r(), emotional: r(), comms: r(), lifestyle: r() };
                scores.overall = Math.round((scores.zodiac + scores.emotional + scores.comms + scores.lifestyle) / 4);
                return scores;
            }
        }

        function displayQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('questionContainer').innerHTML = `
                <div class="question">
                    <div style="color: #667eea; font-size: 0.9em;">${q.category}</div>
                    <div class="question-text">${currentQuestion + 1}. ${q.question}</div>
                    <div class="options">
                        ${q.options.map((opt, idx) => `<div class="option" onclick="selectOption(${idx})">${opt}</div>`).join('')}
                    </div>
                </div>`;
            updateProgress();
        }

        function selectOption(idx) {
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            document.querySelectorAll('.option')[idx].classList.add('selected');
            answers[currentQuestion] = idx;
            document.getElementById('nextBtn').disabled = false;
        }

        function updateProgress() {
            const p = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = p + '%';
            document.getElementById('progressText').textContent = `Step ${currentQuestion + 1} of ${questions.length}`;
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) { displayQuestion(); document.getElementById('nextBtn').disabled = true; }
            else { analyzeResults(); }
        }

        function analyzeResults() {
            showScreen('analyzingScreen');
            setTimeout(showResults, 2500);
        }

        function showResults() {
            const s = calculateDetailedCompatibility();
            showScreen('resultScreen');
            document.getElementById('scoreDisplay').textContent = s.overall + '%';
            
            const cats = [
                { l: '⭐ Zodiac Match', v: s.zodiac }, { l: '💭 Emotional', v: s.emotional },
                { l: '💬 Communication', v: s.comms }, { l: '🏡 Lifestyle', v: s.lifestyle }
            ];
            
            document.getElementById('breakdownContainer').innerHTML = cats.map(c => `
                <div class="breakdown-item">
                    <div class="breakdown-label">${c.l}</div>
                    <div style="display: flex; align-items: center;">
                        <div class="bar-container"><div class="bar-fill" style="width: ${c.v}%"></div></div>
                        <div class="breakdown-score">${c.v}%</div>
                    </div>
                </div>`).join('');

            if (s.overall === 100) {
                document.getElementById('heartEmoji').textContent = '💖';
                document.getElementById('resultMessage').textContent = 'PERFECT SOULMATES!';
                document.getElementById('resultDetail').innerHTML = `The stars confirm it! This connection is unbreakable. 🌟`;
                createConfetti();
            } else {
                document.getElementById('heartEmoji').textContent = '💗';
                document.getElementById('resultMessage').textContent = 'Great Potential!';
                document.getElementById('resultDetail').innerHTML = `A strong score of ${s.overall}%! Every relationship grows with effort. 🌸`;
            }
        }

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + '%';
                c.style.background = ['#667eea','#764ba2','#ff7675'][Math.floor(Math.random()*3)];
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3000);
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function restart() { location.reload(); }
    </script>
</body>
</html>
