<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 Love Compatibility Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .question {
            margin-bottom: 25px;
        }

        .question-text {
            font-weight: 500;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-weight: 500;
        }

        .option:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .progress-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.5s;
        }

        .analyzing {
            text-align: center;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .analyzing-text {
            color: #666;
            margin: 10px 0;
            font-size: 0.9em;
        }

        .result {
            text-align: center;
        }

        .heart-container {
            font-size: 80px;
            margin: 20px 0;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            10%, 30% { transform: scale(1.1); }
            20%, 40% { transform: scale(1); }
        }

        .compatibility-score {
            font-size: 4em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
        }

        .result-message {
            font-size: 1.3em;
            color: #333;
            margin: 20px 0;
            font-weight: 500;
        }

        .result-detail {
            color: #666;
            line-height: 1.6;
            margin: 20px 0;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #667eea;
            animation: confetti-fall 3s linear forwards;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 1.5em;
            }

            .compatibility-score {
                font-size: 3em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💕 Love Compatibility Quiz</h1>
        <p class="subtitle">Discover your perfect match score!</p>

        <div class="screen active" id="nameScreen">
            <div class="input-group">
                <label for="nameInput">Enter Your Name:</label>
                <input type="text" id="nameInput" placeholder="Your beautiful name...">
            </div>
            <div class="input-group">
                <label for="partnerInput">Enter Your Partner's Name:</label>
                <input type="text" id="partnerInput" placeholder="Their lovely name...">
            </div>
            <button onclick="startQuiz()">Start Quiz ✨</button>
        </div>

        <div class="screen" id="quizScreen">
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div id="questionContainer"></div>
            <button onclick="nextQuestion()" id="nextBtn" disabled>Next →</button>
        </div>

        <div class="screen" id="analyzingScreen">
            <div class="analyzing">
                <div class="spinner"></div>
                <p class="analyzing-text" id="analyzingText">Analyzing compatibility...</p>
            </div>
        </div>

        <div class="screen" id="resultScreen">
            <div class="result">
                <div class="heart-container">💖</div>
                <div class="compatibility-score" id="scoreDisplay">100%</div>
                <div class="result-message" id="resultMessage">Perfect Match!</div>
                <div class="result-detail" id="resultDetail"></div>
                <button onclick="restart()">Try Again 🔄</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "What's your ideal date night?",
                options: ["Cozy movie night at home", "Adventurous outdoor activity", "Fancy dinner at a restaurant", "Concert or live show"]
            },
            {
                question: "Pick your favorite season:",
                options: ["Spring 🌸", "Summer ☀️", "Autumn 🍂", "Winter ❄️"]
            },
            {
                question: "What's your go-to comfort food?",
                options: ["Pizza", "Ice cream", "Chocolate", "Homemade cookies"]
            },
            {
                question: "How do you handle a bad day?",
                options: ["Talk it out with someone", "Alone time to recharge", "Distract myself with fun", "Sleep it off"]
            },
            {
                question: "Your dream vacation spot?",
                options: ["Beach paradise", "Mountain retreat", "European city tour", "Tropical island"]
            },
            {
                question: "Pick a superpower:",
                options: ["Time travel", "Mind reading", "Invisibility", "Flying"]
            },
            {
                question: "Morning person or night owl?",
                options: ["Early bird 🌅", "Night owl 🦉", "Depends on the day", "I don't sleep 😅"]
            },
            {
                question: "Your favorite way to relax?",
                options: ["Reading a book", "Watching shows", "Listening to music", "Taking a nap"]
            }
        ];

        let currentQuestion = 0;
        let userName = "";
        let partnerName = "";
        let answers = [];

        function startQuiz() {
            userName = document.getElementById('nameInput').value.trim();
            partnerName = document.getElementById('partnerInput').value.trim();
            if (!userName || !partnerName) {
                alert('Please enter both names! 💕');
                return;
            }
            showScreen('quizScreen');
            displayQuestion();
        }

        function checkPerfectMatch() {
            // Convert to lowercase for checking
            const name1 = userName.toLowerCase();
            const name2 = partnerName.toLowerCase();
            
            // Check if one field contains Tanush and the other contains Sumera
            const isTanush1 = name1.includes('tanush');
            const isSumera1 = name1.includes('sumera');
            const isTanush2 = name2.includes('tanush');
            const isSumera2 = name2.includes('sumera');
            
            // It's ONLY a perfect match if (Person 1 is Tanush AND Person 2 is Sumera) 
            // OR (Person 1 is Sumera AND Person 2 is Tanush)
            if ((isTanush1 && isSumera2) || (isSumera1 && isTanush2)) {
                return true;
            }
            
            return false;
        }

        function calculateCompatibility() {
            if (checkPerfectMatch()) {
                return 100;
            } else {
                // Random compatibility between 45-85% based on answers
                const baseScore = 45;
                const answerBonus = Math.floor(Math.random() * 40);
                return baseScore + answerBonus;
            }
        }

        function displayQuestion() {
            const question = questions[currentQuestion];
            const container = document.getElementById('questionContainer');
            
            container.innerHTML = `
                <div class="question">
                    <div class="question-text">${currentQuestion + 1}. ${question.question}</div>
                    <div class="options">
                        ${question.options.map((opt, idx) => `
                            <div class="option" onclick="selectOption(${idx})">${opt}</div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            updateProgress();
        }

        function selectOption(index) {
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            options[index].classList.add('selected');
            
            answers[currentQuestion] = index;
            document.getElementById('nextBtn').disabled = false;
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function nextQuestion() {
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                displayQuestion();
                document.getElementById('nextBtn').disabled = true;
            } else {
                analyzeResults();
            }
        }

        function analyzeResults() {
            showScreen('analyzingScreen');
            
            const analyzingMessages = [
                "Analyzing compatibility...",
                "Calculating cosmic alignment...",
                "Reading the stars...",
                "Consulting the love algorithm...",
                "Processing romantic chemistry..."
            ];
            
            let messageIndex = 0;
            const messageInterval = setInterval(() => {
                messageIndex = (messageIndex + 1) % analyzingMessages.length;
                document.getElementById('analyzingText').textContent = analyzingMessages[messageIndex];
            }, 800);
            
            setTimeout(() => {
                clearInterval(messageInterval);
                showResults();
            }, 3000);
        }

        function showResults() {
            const score = calculateCompatibility();
            
            showScreen('resultScreen');
            
            // Update score
            document.getElementById('scoreDisplay').textContent = score + '%';
            
            // Update message and details based on score
            let message, detail, heart;
            
            if (score === 100) {
                heart = '💖';
                message = 'Perfect Match!';
                detail = `${userName} and ${partnerName}, you two are absolutely meant to be! Your compatibility is off the charts! 🌟 The universe has aligned perfectly for your love story. Every answer shows how perfectly you complement each other!`;
                createConfetti();
            } else if (score >= 80) {
                heart = '💕';
                message = 'Great Match!';
                detail = `${userName} and ${partnerName} have amazing chemistry! With ${score}% compatibility, you share many interests and values. Keep nurturing this connection!`;
            } else if (score >= 65) {
                heart = '💗';
                message = 'Good Match!';
                detail = `${userName} and ${partnerName} have solid compatibility at ${score}%. You have a good foundation with room to grow together. Communication is key!`;
            } else {
                heart = '💝';
                message = 'Compatible!';
                detail = `${userName} and ${partnerName} scored ${score}%. Every relationship is unique, and compatibility is just one piece of the puzzle. What matters most is how you both grow together!`;
            }
            
            document.querySelector('.heart-container').textContent = heart;
            document.getElementById('resultMessage').textContent = message;
            document.getElementById('resultDetail').textContent = detail;
        }

        function createConfetti() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b'];
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 30);
            }
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        function restart() {
            currentQuestion = 0;
            answers = [];
            userName = "";
            partnerName = "";
            document.getElementById('nameInput').value = "";
            document.getElementById('partnerInput').value = "";
            document.getElementById('nextBtn').disabled = true;
            showScreen('nameScreen');
        }
    </script>
</body>
</html>
